name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for manual bootstrap tag
        id: bootstrap
        run: |
          if git rev-parse "refs/tags/v0.1.0" >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Bootstrap tag v0.1.0 not found. Skipping release-please until the manual bootstrap release exists."

      - name: Run release-please
        if: ${{ steps.bootstrap.outputs.ready == 'true' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
