name: conventional-pr-title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  conventional-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(revert: )?(build|chore|ci|deps|docs|feat|fix|perf|refactor|style|test)(\([[:alnum:]_.\/-]+\))?(!)?: .+$'
          if [[ "$PR_TITLE" =~ $pattern ]]; then
            exit 0
          fi

          echo "PR titles must follow Conventional Commits." >&2
          echo "Examples: feat: add symbol filters, fix(cli): handle empty query, chore(main): release 0.1.1" >&2
          exit 1
