name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_CACHE: /tmp/reporag-npm-cache
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release readiness
        run: npm run release:validate

      - name: Run packed tarball smoke test
        run: npm run smoke:pack
